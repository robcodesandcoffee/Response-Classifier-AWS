name: Deploy Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/deploy_terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "Action to perform"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm:
        description: "Type 'destroy-dev' to confirm a destroy (ignored for plan/apply)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write # Required for OIDC authentication
  contents: read
  pull-requests: write # Required to post plan as PR comment

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "~1.6"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pull requests: run `terraform plan` against dev and post as PR comment.
  # No infrastructure is applied — this is review-only.
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (dev) — PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.env }}

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -var-file=terraform.tfvars -no-color -out=tfplan 2>&1 | tee tfplan.txt
          echo "plan_output<<EOF" >> "$GITHUB_OUTPUT"
          cat tfplan.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        working-directory: terraform/environments/${{ matrix.env }}
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan — \`${{ matrix.env }}\`
            **Init**: \`${{ steps.init.outcome }}\`
            **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.plan_output }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # Manual run: engineer picks the target environment and whether to plan
  # or apply. Branch/tag is chosen via the "Use workflow from" dropdown
  # in the GitHub Actions UI.
  #
  # Staging and prod still go through GitHub Environment approval gates
  # because we set `environment:` on the job.
  # ─────────────────────────────────────────────────────────────────────────
  terraform:
    name: ${{ inputs.action }} → ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Run summary
        run: |
          {
            echo "## Terraform ${{ inputs.action }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────────────────────────────────────────────────────────────────
      # Destroy guards: only allow destroy in dev, and require an explicit
      # confirmation string so it can't be triggered by a stray click.
      # ───────────────────────────────────────────────────────────────────
      - name: Guard — destroy is dev-only
        if: inputs.action == 'destroy' && inputs.environment != 'dev'
        run: |
          echo "::error::Destroy is only allowed against the 'dev' environment. Refusing to destroy '${{ inputs.environment }}'."
          exit 1

      - name: Guard — destroy requires confirmation
        if: inputs.action == 'destroy' && inputs.confirm != 'destroy-dev'
        run: |
          echo "::error::To destroy dev you must type 'destroy-dev' in the confirm input. Got: '${{ inputs.confirm }}'."
          exit 1

      - uses: actions/checkout@v4

      # Confirm the env-scoped secret resolves before the AWS step
      # tries to use it. Remove once OIDC auth is verified working.
      - name: Debug — is AWS_ROLE_TO_ASSUME set?
        run: |
          echo "AWS_ROLE_TO_ASSUME is set: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}"
          echo "Environment: ${{ inputs.environment }}"

      # AWS_ROLE_TO_ASSUME is defined as an "environment secret" in each
      # GitHub Environment (dev/staging/prod), so `secrets.AWS_ROLE_TO_ASSUME`
      # resolves to the per-environment role ARN automatically.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Plan
        if: inputs.action == 'plan'
        run: terraform plan -var-file=terraform.tfvars
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/${{ inputs.environment }}
