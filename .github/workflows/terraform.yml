name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [ main ]
    paths:
      - "terraform/**"

permissions:
  id-token: write # Required for OIDC authentication
  contents: read
  pull-requests: write # Required to post plan as PR comment

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "~1.6"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # On Pull Requests: run plan and post output as a PR comment
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Plan (${{ matrix.env }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [ dev ] # Only plan dev on PRs; staging/prod planned in their own deploy jobs

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.env }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=terraform.tfvars -no-color -out=tfplan
        working-directory: terraform/environments/${{ matrix.env }}
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan — \`${{ matrix.env }}\`
            **Init**: \`${{ steps.init.outcome }}\`
            **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # On merge to main: apply dev automatically
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply-dev:
    name: Apply (dev)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev # Maps to GitHub Environment "dev" (no approval required)

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/dev

  # ─────────────────────────────────────────────────────────────────────────
  # Staging: triggered manually or via workflow_dispatch — requires approval
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply-staging:
    name: Apply (staging)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    environment: staging # Requires manual approval in GitHub Environments settings

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/staging

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/staging

  # ─────────────────────────────────────────────────────────────────────────
  # Production: runs after staging — requires manual approval
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply-prod:
    name: Apply (prod)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    environment: prod # Requires manual approval in GitHub Environments settings

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/prod
