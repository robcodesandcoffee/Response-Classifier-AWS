name: Deploy Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/deploy_terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "Action to perform"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm:
        description: "Type 'destroy-dev' to confirm a destroy (ignored for plan/apply)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write # Required for OIDC authentication
  contents: read
  pull-requests: write # Required to post plan as PR comment

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "~1.6"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pull requests: run `terraform plan` against dev and post as PR comment.
  # No infrastructure is applied — this is review-only.
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (dev) — PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        env: [dev]

    steps:
      - uses: actions/checkout@v5

      - name: Check AWS auth availability
        id: aws-auth
        shell: bash
        run: |
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "AWS auth is configured for this run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS_ROLE_TO_ASSUME is not available for the dev environment for this pull request run; skipping Terraform plan."
          fi

      - uses: aws-actions/configure-aws-credentials@v5
        if: steps.aws-auth.outputs.enabled == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        if: steps.aws-auth.outputs.enabled == 'true'
        run: terraform init
        working-directory: terraform/environments/${{ matrix.env }}

      - name: Terraform Plan
        id: plan
        if: steps.aws-auth.outputs.enabled == 'true'
        shell: bash
        run: |
          set -o pipefail
          terraform plan -var-file=terraform.tfvars -no-color -out=tfplan 2>&1 | tee tfplan.txt
          echo "plan_output<<EOF" >> "$GITHUB_OUTPUT"
          cat tfplan.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        working-directory: terraform/environments/${{ matrix.env }}
        continue-on-error: true

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const skipped = '${{ steps.aws-auth.outputs.enabled }}' !== 'true';
            const output = skipped
              ? `### Terraform Plan — \`${{ matrix.env }}\`

              ⚠️ Terraform plan was skipped because AWS credentials were not available for this pull request run.

              *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`
              : `### Terraform Plan — \`${{ matrix.env }}\`
            **Init**: \`${{ steps.init.outcome }}\`
            **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.plan_output }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # Manual run: engineer picks the target environment and whether to plan,
  # apply, or destroy. Each action is surfaced as its own job in the UI,
  # so the workflow reads like a simple deployment flow.
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan-manual:
    name: Terraform Plan
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'plan'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Run summary
        run: |
          {
            echo "## Terraform Plan"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Action | \`plan\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars
        working-directory: terraform/environments/${{ inputs.environment }}

  terraform-apply-manual:
    name: Terraform Apply
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Run summary
        run: |
          {
            echo "## Terraform Apply"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Action | \`apply\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/${{ inputs.environment }}

  terraform-destroy-manual:
    name: Terraform Destroy
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Run summary
        run: |
          {
            echo "## Terraform Destroy"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Action | \`destroy\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Guard — destroy is dev-only
        if: inputs.environment != 'dev'
        run: |
          echo "::error::Destroy is only allowed against the 'dev' environment. Refusing to destroy '${{ inputs.environment }}'."
          exit 1

      - name: Guard — destroy requires confirmation
        if: inputs.confirm != 'destroy-dev'
        run: |
          echo "::error::To destroy dev you must type 'destroy-dev' in the confirm input. Got: '${{ inputs.confirm }}'."
          exit 1

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/${{ inputs.environment }}

      - name: Terraform Destroy
        run: terraform destroy -var-file=terraform.tfvars -auto-approve
        working-directory: terraform/environments/${{ inputs.environment }}
